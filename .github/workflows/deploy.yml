name: Flutter Web CI/CD Pipeline

on:
  push:
    branches: [ main ] # Triggers whenever you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Packages
        run: flutter pub get

      # Optional Stage: You have a "selenium_tests" and "appium_tests" folder.
      # If your Node automated tests are configured for headless environments, 
      # you can uncomment this to block deployment if your E2E validation fails:
      # - name: Run Test Suite
      #   run: |
      #     cd selenium_tests
      #     npm install
      #     npm test

      - name: Compile Flutter Web
        run: flutter build web --base-href "/${{ github.event.repository.name }}/"

      - name: Deploy Compiled Files to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages # Automatically pushes build/web here