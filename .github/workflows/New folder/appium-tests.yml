name: Appium Mobile Automation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mobile-testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd selenium_tests
          npm install

      # Appium requires an active server driver instance running in the background
      - name: Start Appium Server
        run: |
          npm install -g appium
          appium &
        async: true

      - name: Run Appium Mobile Tests
        run: |
          cd selenium_tests
          npm run test-appium

      - name: Upload Mobile Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Mobile-Report
          path: selenium_tests/reports/*appium*.xlsx