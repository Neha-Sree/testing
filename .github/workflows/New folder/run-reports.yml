name: Generate 11-Topic Web Report

on:
  push:
    branches: [ main ] # Triggers the script every time you push to the main branch
  pull_request:
    branches: [ main ]

jobs:
  generate-excel-report:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code onto the GitHub server
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # 2. Set up the Node.js environment on the runner
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Matches a stable Node environment

      # 3. Navigate to selenium_tests and install dependencies (exceljs, etc.)
      - name: Install Project Dependencies
        run: |
          cd selenium_tests
          npm install

      # 4. Execute your custom node generation script
      - name: Run 11-Topic Report Generation
        run: |
          cd selenium_tests
          npm run test-report

      # 5. Save the generated Excel file as an artifact so you can download it from GitHub
      - name: Upload Generated Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-11-topics-report
          path: selenium_tests/reports/selenium_11_topics_110_web_cases.xlsx